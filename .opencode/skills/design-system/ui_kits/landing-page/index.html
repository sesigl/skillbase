<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Skillbase — governance and analytics for AI coding skills</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<style>
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:var(--bg);color:var(--fg);font-family:var(--font-sans);-webkit-font-smoothing:antialiased}
  a{color:inherit}
  strong{font-weight:600}
  /* responsive collapses */
  @media (max-width: 860px){
    section [style*="grid-template-columns: 1fr 1fr"],
    section [style*="grid-template-columns: repeat(3, 1fr)"],
    footer [style*="grid-template-columns: 1.4fr"]{grid-template-columns:1fr !important}
  }
  @media (max-width: 720px){
    header nav{display:none !important}
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="Atoms.jsx"></script>
<script type="text/babel" src="Nav.jsx"></script>
<script type="text/babel" src="Hero.jsx"></script>
<script type="text/babel" src="Sections.jsx"></script>
<script type="text/babel" src="Footer.jsx"></script>

<script type="text/babel" data-presets="react">
  function App() {
    React.useEffect(() => {
      if (window.lucide) window.lucide.createIcons();
    });
    return (
      <React.Fragment>
        <Nav />
        <main>
          <Hero />
          <TrustBar />
          <Features />
          <HowItWorks />
          <CTABand />
        </main>
        <Footer />
      </React.Fragment>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

<!-- Lucide icons -->
<script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
<script>
  function paintIcons(){ if (window.lucide) window.lucide.createIcons(); }
  paintIcons();
  const obs = new MutationObserver(paintIcons);
  obs.observe(document.getElementById("root"), { childList: true, subtree: true });
</script>
</body>
</html>
