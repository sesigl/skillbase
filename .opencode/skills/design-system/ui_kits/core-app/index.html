<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Skillbase — skill browser</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<style>
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:var(--bg);color:var(--fg);font-family:var(--font-sans);-webkit-font-smoothing:antialiased}
  code{font-family:var(--font-mono)}
  @media (max-width: 920px){
    .browse-grid{grid-template-columns:1fr !important}
    .rail{display:none !important}
    .detail-grid{grid-template-columns:1fr !important}
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="data.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="Atoms.jsx"></script>
<script type="text/babel" src="AppBar.jsx"></script>
<script type="text/babel" src="Browse.jsx"></script>
<script type="text/babel" src="SkillDetail.jsx"></script>

<script type="text/babel" data-presets="react">
  const { useState, useMemo, useEffect } = React;

  function App() {
    const [query, setQuery] = useState("");
    const [applied, setApplied] = useState("");      // submitted query (server-side feel)
    const [filters, setFilters] = useState({ agents: [], licenses: [], tags: [] });
    const [selected, setSelected] = useState(null);
    const [sort, setSort] = useState("popular");

    useEffect(() => { if (window.lucide) window.lucide.createIcons(); });

    const results = useMemo(() => {
      let r = window.SKILLS.filter((s) => {
        const q = applied.trim().toLowerCase();
        const matchQ = !q || s.name.toLowerCase().includes(q) || s.desc.toLowerCase().includes(q) || s.tags.some((t) => t.includes(q));
        const matchA = !filters.agents.length || filters.agents.some((a) => s.agents.includes(a));
        const matchL = !filters.licenses.length || filters.licenses.includes(s.license);
        const matchT = !filters.tags.length || filters.tags.every((t) => s.tags.includes(t));
        return matchQ && matchA && matchL && matchT;
      });
      r = [...r].sort((a, b) => sort === "recent" ? 0 : b.invocations - a.invocations);
      return r;
    }, [applied, filters, sort]);

    const counts = useMemo(() => {
      const agents = {}, licenses = {};
      window.SKILLS.forEach((s) => {
        s.agents.forEach((a) => (agents[a] = (agents[a] || 0) + 1));
        licenses[s.license] = (licenses[s.license] || 0) + 1;
      });
      return { agents, licenses };
    }, []);

    if (selected) return (
      <React.Fragment>
        <AppBar query={query} onQuery={setQuery} onSubmit={() => { setApplied(query); setSelected(null); }} />
        <SkillDetail skill={selected} onBack={() => setSelected(null)} />
      </React.Fragment>
    );

    return (
      <React.Fragment>
        <AppBar query={query} onQuery={setQuery} onSubmit={() => setApplied(query)} />
        <div style={{ maxWidth: "var(--maxw-wide)", margin: "0 auto", padding: "32px 24px 80px" }}>
          <div style={{ marginBottom: 26 }}>
            <h1 style={{ fontFamily: "var(--font-display)", fontWeight: 700, fontSize: 30, color: "var(--ink)", letterSpacing: "-0.02em", margin: 0 }}>
              {applied ? "Search results" : "Browse skills"}
            </h1>
            <p style={{ fontFamily: "var(--font-sans)", fontSize: 14.5, color: "var(--fg-muted)", margin: "8px 0 0" }}>
              {applied
                ? <>{results.length} {results.length === 1 ? "skill" : "skills"} matching <code style={{ color: "var(--accent-text)" }}>{applied}</code></>
                : "Your team's AI coding skills. Governance and analytics, right in the browser."}
            </p>
          </div>

          <div className="browse-grid" style={{ display: "grid", gridTemplateColumns: "232px 1fr", gap: 32, alignItems: "start" }}>
            <div className="rail"><FilterRail filters={filters} setFilters={setFilters} counts={counts} /></div>
            <div>
              <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 16 }}>
                <span style={{ fontFamily: "var(--font-mono)", fontSize: 12.5, color: "var(--fg-faint)" }}>{results.length} of {window.SKILLS.length} skills</span>
                <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                  <span style={{ fontFamily: "var(--font-sans)", fontSize: 13, color: "var(--fg-muted)" }}>Sort</span>
                  <select value={sort} onChange={(e) => setSort(e.target.value)} style={{ fontFamily: "var(--font-sans)", fontSize: 13, color: "var(--ink)", background: "var(--surface)", border: "1px solid var(--border-strong)", borderRadius: "var(--radius-sm)", padding: "6px 10px", cursor: "pointer" }}>
                    <option value="popular">Most invoked</option>
                    <option value="recent">Recently updated</option>
                  </select>
                </div>
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(290px, 1fr))", gap: 16 }}>
                {results.length === 0
                  ? <EmptyState query={applied} onClear={() => { setQuery(""); setApplied(""); setFilters({ agents: [], licenses: [], tags: [] }); }} />
                  : results.map((s) => <SkillCard key={s.name + s.author} skill={s} onOpen={setSelected} />)}
              </div>
            </div>
          </div>
        </div>
      </React.Fragment>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

<script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
<script>
  function paintIcons(){ if (window.lucide) window.lucide.createIcons(); }
  paintIcons();
  new MutationObserver(paintIcons).observe(document.getElementById("root"), { childList: true, subtree: true });
</script>
</body>
</html>
