<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:var(--bg);color:var(--fg);font-family:var(--font-sans);padding:22px 30px;display:flex;flex-direction:column;gap:13px}
  .line{display:flex;align-items:baseline;gap:18px}
  .tag{font-family:var(--font-mono);font-size:10.5px;color:var(--fg-faint);width:104px;flex:none}
  .spec{color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
</style>
</head>
<body>
  <div class="line"><span class="tag">display / h1</span><span class="spec" style="font-family:var(--font-display);font-weight:700;font-size:34px;letter-spacing:-0.02em;line-height:1">Manage your skills</span></div>
  <div class="line"><span class="tag">h2 · 600</span><span class="spec" style="font-family:var(--font-display);font-weight:600;font-size:26px;letter-spacing:-0.01em;line-height:1">Browse your skills</span></div>
  <div class="line"><span class="tag">h3 · 600</span><span class="spec" style="font-family:var(--font-display);font-weight:600;font-size:20px;line-height:1">Skill metadata</span></div>
  <div class="line"><span class="tag">lead · 17</span><span class="spec" style="font-size:17px;color:var(--fg-muted);line-height:1.2">A self-contained AI coding capability from your repo.</span></div>
  <div class="line"><span class="tag">body · 15</span><span class="spec" style="font-size:15px;line-height:1.2">Default UI and paragraph text, set in Geist.</span></div>
  <div class="line"><span class="tag">small · 13</span><span class="spec" style="font-size:13px;color:var(--fg-muted);line-height:1.2">Secondary labels and helper copy.</span></div>
</body>
</html>
