<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:var(--stone-950);color:var(--fg);font-family:var(--font-sans);padding:28px 32px;display:flex;align-items:center;gap:40px;}
  .lockup{display:flex;align-items:center;gap:14px}
  .wm{font-family:var(--font-display);font-weight:700;letter-spacing:-0.02em;font-size:34px;color:var(--stone-100)}
  .chip{margin-left:auto;font-family:var(--font-mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--lime-300);border:1px solid var(--border);border-radius:var(--radius-pill);padding:6px 12px}
</style>
</head>
<body>
  <div class="lockup">
    <svg width="44" height="44" viewBox="0 0 32 32"><rect x="1.5" y="17" width="13" height="13" rx="3.2" fill="#e9ecf1"/><rect x="17.5" y="17" width="13" height="13" rx="3.2" fill="#e9ecf1"/><rect x="9.5" y="1.5" width="13" height="13" rx="3.2" fill="#9ee63b"/></svg>
    <span class="wm">skillbase</span>
  </div>
  <span class="chip">on ink</span>
</body>
</html>
