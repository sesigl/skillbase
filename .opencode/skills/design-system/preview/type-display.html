<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:var(--bg);color:var(--fg);font-family:var(--font-display);padding:24px 30px}
  .eyebrow{font-family:var(--font-mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--accent-text);margin-bottom:10px}
  .big{font-size:56px;font-weight:700;letter-spacing:-0.025em;line-height:1.0;color:var(--ink)}
  .big em{font-style:normal;color:var(--lime-600)}
  .sub{font-family:var(--font-sans);font-size:14px;color:var(--fg-muted);margin-top:14px;letter-spacing:0}
</style>
</head>
<body>
  <div class="eyebrow">// Space Grotesk · display</div>
  <div class="big">Build on a <em>base</em>.</div>
  <div class="sub">700 · tracking −0.025em · governance and analytics for AI coding skills</div>
</body>
</html>
