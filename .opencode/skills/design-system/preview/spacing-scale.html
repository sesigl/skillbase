<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:var(--bg);color:var(--fg);font-family:var(--font-mono);padding:22px 30px;display:flex;flex-direction:column;gap:9px}
  .row{display:flex;align-items:center;gap:14px;font-size:11px;color:var(--fg-muted)}
  .bar{height:14px;background:var(--lime-400);border-radius:2px}
  .lab{width:74px;flex:none;color:var(--fg-faint)}
</style>
</head>
<body>
  <div class="row"><span class="lab">1 · 4px</span><span class="bar" style="width:4px"></span></div>
  <div class="row"><span class="lab">2 · 8px</span><span class="bar" style="width:8px"></span></div>
  <div class="row"><span class="lab">3 · 12px</span><span class="bar" style="width:12px"></span></div>
  <div class="row"><span class="lab">4 · 16px</span><span class="bar" style="width:16px"></span></div>
  <div class="row"><span class="lab">6 · 24px</span><span class="bar" style="width:24px"></span></div>
  <div class="row"><span class="lab">8 · 32px</span><span class="bar" style="width:32px"></span></div>
  <div class="row"><span class="lab">12 · 48px</span><span class="bar" style="width:48px"></span></div>
  <div class="row"><span class="lab">16 · 64px</span><span class="bar" style="width:64px"></span></div>
  <div class="row"><span class="lab">24 · 96px</span><span class="bar" style="width:96px"></span></div>
</body>
</html>
