<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:var(--bg);color:var(--fg);font-family:var(--font-sans);padding:24px 28px}
  .row{display:flex;gap:8px}
  .sw{flex:1;display:flex;flex-direction:column;gap:7px}
  .chip{height:64px;border-radius:var(--radius-md);border:1px solid var(--stone-200)}
  .name{font-family:var(--font-mono);font-size:10.5px;color:var(--fg-muted)}
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--stone-50)"></div><div class="name">stone-50</div></div>
    <div class="sw"><div class="chip" style="background:var(--stone-100)"></div><div class="name">stone-100</div></div>
    <div class="sw"><div class="chip" style="background:var(--stone-200)"></div><div class="name">stone-200</div></div>
    <div class="sw"><div class="chip" style="background:var(--stone-300)"></div><div class="name">stone-300</div></div>
    <div class="sw"><div class="chip" style="background:var(--stone-400)"></div><div class="name">stone-400</div></div>
    <div class="sw"><div class="chip" style="background:var(--stone-500)"></div><div class="name">stone-500</div></div>
    <div class="sw"><div class="chip" style="background:var(--stone-600)"></div><div class="name">stone-600</div></div>
    <div class="sw"><div class="chip" style="background:var(--stone-700)"></div><div class="name">stone-700</div></div>
    <div class="sw"><div class="chip" style="background:var(--stone-800)"></div><div class="name">stone-800</div></div>
    <div class="sw"><div class="chip" style="background:var(--stone-900)"></div><div class="name">stone-900</div></div>
    <div class="sw"><div class="chip" style="background:var(--stone-950)"></div><div class="name">stone-950</div></div>
  </div>
</body>
</html>
