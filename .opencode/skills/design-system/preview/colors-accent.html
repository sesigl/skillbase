<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:var(--bg);color:var(--fg);font-family:var(--font-sans);padding:24px 28px}
  .row{display:flex;gap:10px}
  .sw{flex:1;display:flex;flex-direction:column;gap:8px}
  .chip{height:62px;border-radius:var(--radius-md);border:1px solid var(--stone-200)}
  .name{font-family:var(--font-mono);font-size:11px;color:var(--fg-muted)}
  .feat{flex:1.6;border-radius:var(--radius-md);height:62px;display:flex;align-items:center;padding:0 18px;gap:14px}
  .feat .ftag{font-family:var(--font-mono);font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink);opacity:.7}
  .feat .fval{font-family:var(--font-display);font-weight:700;font-size:18px;color:var(--ink);letter-spacing:-0.01em}
</style>
</head>
<body>
  <div class="row">
    <div class="sw" style="flex:1.6">
      <div class="feat" style="background:var(--lime-400)">
        <span class="ftag">Signature · lime-400</span>
        <span class="fval" style="margin-left:auto">#9EE63B</span>
      </div>
      <div class="name">primary accent — CTA fills, focus, brand block</div>
    </div>
    <div class="sw"><div class="chip" style="background:var(--lime-50)"></div><div class="name">lime-50</div></div>
    <div class="sw"><div class="chip" style="background:var(--lime-100)"></div><div class="name">lime-100</div></div>
    <div class="sw"><div class="chip" style="background:var(--lime-200)"></div><div class="name">lime-200</div></div>
    <div class="sw"><div class="chip" style="background:var(--lime-300)"></div><div class="name">lime-300</div></div>
    <div class="sw"><div class="chip" style="background:var(--lime-500)"></div><div class="name">lime-500</div></div>
    <div class="sw"><div class="chip" style="background:var(--lime-600)"></div><div class="name">lime-600</div></div>
    <div class="sw"><div class="chip" style="background:var(--lime-700)"></div><div class="name">lime-700·text</div></div>
  </div>
</body>
</html>
