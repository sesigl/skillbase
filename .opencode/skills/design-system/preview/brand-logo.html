<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:var(--bg);color:var(--fg);font-family:var(--font-sans);padding:28px 32px;display:flex;align-items:center;gap:48px;}
  .mark{color:var(--ink);display:flex;align-items:flex-end;gap:28px}
  svg{display:block}
  .lockup{display:flex;align-items:center;gap:14px;color:var(--ink)}
  .lockup .wm{font-family:var(--font-display);font-weight:700;letter-spacing:-0.02em;font-size:34px;color:var(--ink)}
  .divider{width:1px;align-self:stretch;background:var(--border)}
</style>
</head>
<body>
  <div class="mark">
    <svg width="64" height="64" viewBox="0 0 32 32"><rect x="1.5" y="17" width="13" height="13" rx="3.2" fill="currentColor"/><rect x="17.5" y="17" width="13" height="13" rx="3.2" fill="currentColor"/><rect x="9.5" y="1.5" width="13" height="13" rx="3.2" fill="#9ee63b"/></svg>
    <svg width="40" height="40" viewBox="0 0 32 32"><rect x="1.5" y="17" width="13" height="13" rx="3.2" fill="currentColor"/><rect x="17.5" y="17" width="13" height="13" rx="3.2" fill="currentColor"/><rect x="9.5" y="1.5" width="13" height="13" rx="3.2" fill="#9ee63b"/></svg>
    <svg width="24" height="24" viewBox="0 0 32 32"><rect x="1.5" y="17" width="13" height="13" rx="3.2" fill="currentColor"/><rect x="17.5" y="17" width="13" height="13" rx="3.2" fill="currentColor"/><rect x="9.5" y="1.5" width="13" height="13" rx="3.2" fill="#9ee63b"/></svg>
  </div>
  <div class="divider"></div>
  <div class="lockup">
    <svg width="34" height="34" viewBox="0 0 32 32"><rect x="1.5" y="17" width="13" height="13" rx="3.2" fill="currentColor"/><rect x="17.5" y="17" width="13" height="13" rx="3.2" fill="currentColor"/><rect x="9.5" y="1.5" width="13" height="13" rx="3.2" fill="#9ee63b"/></svg>
    <span class="wm">skillbase</span>
  </div>
</body>
</html>
