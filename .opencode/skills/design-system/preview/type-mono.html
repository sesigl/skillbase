<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:var(--bg);color:var(--fg);font-family:var(--font-mono);padding:24px 30px;display:flex;flex-direction:column;gap:16px}
  .ident{font-size:22px;font-weight:500;color:var(--ink);letter-spacing:-0.01em}
  .ident .at{color:var(--stone-400)}
  .ident .auth{color:var(--fg-muted)}
  .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  .tag{font-size:12px;font-weight:500;padding:5px 11px;border-radius:var(--radius-pill);background:var(--surface-2);border:1px solid var(--stone-200);color:var(--fg-muted)}
  .meta{font-size:12px;color:var(--fg-faint);display:flex;gap:18px}
  .note{font-family:var(--font-sans);font-size:11.5px;color:var(--fg-faint)}
</style>
</head>
<body>
  <div class="ident">commit-helper<span class="at">@</span><span class="auth">anthropic</span></div>
  <div class="row">
    <span class="tag">git</span><span class="tag">automation</span><span class="tag">claude-code</span><span class="tag">opencode</span>
  </div>
  <div class="meta"><span>v0.4.2</span><span>MIT</span><span>1,284 invocations</span><span>updated 3d ago</span></div>
  <div class="note">JetBrains Mono — carries skill identity (name@author), tags, versions & commands</div>
</body>
</html>
